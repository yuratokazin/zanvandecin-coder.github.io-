<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Мета-информация о странице -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя личная страница</title>
    
    <!-- Стили для оформления страницы -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
        }
        
        .contact {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Заголовок страницы -->
        <h1>Личная страница</h1>
        
        <!-- Основная информация -->
        <div class="about">
            <h2>Обо мне</h2>
            <p>Привет! Меня зовут [Ваше имя]. Я увлекаюсь [ваше хобби/профессия].</p>
        </div>
        
        <!-- Контактная информация -->
        <div class="contact">
            <h2>Контакты</h2>
            <p>Email: <a href="mailto:your@email.com">your@email.com</a></p>
            <p>Телефон: <a href="tel:+79991234567">+7 999 123-45-67</a></p>
            <p>Социальные сети:</p>
            <ul>
                <li><a href="https://vk.com">ВКонтакте</a></li>
                <li><li><a href="https://t.me">Telegram</a></li>
            </ul>
        </div>
        
        <!-- Образование и опыт -->
        <div class="education">
            <h2>Образование</h2>
            <p>[Ваше образование]</p>
        </div>
        
        <!-- Навыки -->
        <div class="skills">
            <h2>Навыки</h2>
            <ul>
                <li>HTML/CSS</li>
                <li>JavaScript</li>
                <li>Дизайн</li>
            </ul>
        </div>
    </div>
</body>
</html>
